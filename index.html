<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Arena Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#312e2b;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
min-height:100vh;
}

h1{
font-size:48px;
margin-bottom:20px;
color:#81b64c;
}

.board{
width:640px;
height:640px;
display:grid;
grid-template-columns:repeat(8,80px);
grid-template-rows:repeat(8,80px);
border:6px solid #262421;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.square{
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-size:64px;
cursor:pointer;
transition:0.15s;
user-select:none;
}

.square:hover{
transform:scale(1.03);
}

.light{
background:#f0d9b5;
}

.dark{
background:#b58863;
}

.white-piece{
color:white;
}

.black-piece{
color:black;
}

.selected{
outline:4px solid yellow;
}

.possible{
box-shadow:inset 0 0 0 4px yellow;
}

#status{
margin-top:20px;
font-size:28px;
font-weight:bold;
}

#thinking{
margin-top:10px;
font-size:22px;
color:gold;
text-align:center;
}

.sidebar{
width:640px;
margin-top:20px;
}

.bot{
padding:14px;
background:#262421;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-size:18px;
font-weight:bold;
transition:0.2s;
}

.bot:hover{
background:#81b64c;
}

.controls{
width:640px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:#81b64c;
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

#moves{
width:640px;
background:#262421;
margin-top:20px;
padding:20px;
border-radius:12px;
line-height:1.8;
}

@media(max-width:700px){

.board{
width:96vw;
height:96vw;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
}

.square{
width:100%;
height:100%;
font-size:10vw;
}

.sidebar{
width:96vw;
}

.controls{
width:96vw;
}

#moves{
width:96vw;
}

}

</style>
</head>

<body>

<h1>♟ Chess Arena Pro</h1>

<div class="board" id="board"></div>

<div id="status"></div>

<div id="thinking"></div>

<div class="controls">

<button onclick="newGame()">🆕 New Game</button>

<button onclick="offerDraw()">🤝 Draw</button>

<button onclick="resignGame()">🏳 Resign</button>

<button onclick="loadPuzzle()">🧩 Puzzle Mode</button>

</div>

<div class="sidebar">

<div class="bot" onclick="selectBot(250)">🤪 Timmy Beginner — 250</div>

<div class="bot" onclick="selectBot(600)">🙂 Alex Casual — 600</div>

<div class="bot" onclick="selectBot(1000)">😎 Noah Club Player — 1000</div>

<div class="bot" onclick="selectBot(1400)">🧠 Sofia Tactical — 1400</div>

<div class="bot" onclick="selectBot(1800)">🔥 Victor Advanced — 1800</div>

<div class="bot" onclick="selectBot(2200)">♜ IM Daniel — 2200</div>

<div class="bot" onclick="selectBot(2300)">👑 GM Hikaru Style — 2300</div>

<div class="bot" onclick="selectBot(2400)">♛ GM Magnus Style — 2400</div>

<div class="bot" onclick="selectBot(2500)">💀 GM Alpha — 2500</div>

<div class="bot" onclick="selectBot(2600)">☠ Elite Engine — 2600</div>

<div class="bot" onclick="selectBot(2700)">🚀 Super GM — 2700</div>

<div class="bot" onclick="selectBot(2800)">🤖 Stockfish Monster — 2800</div>

</div>

<div id="moves"></div>

<script>

const chess = new Chess();

const board = document.getElementById('board');

let currentBotLevel = 250;

let selectedSquare = null;

let possibleMoves = [];

const puzzleData = [

{
name:"Mate in 1 — Queen",
fen:"6k1/5ppp/8/8/8/8/5PPP/6KQ w - - 0 1",
goal:"White to move and mate in 1"
},

{
name:"Mate in 1 — Rook",
fen:"6k1/5ppp/8/8/8/8/5PPP/R5K1 w - - 0 1",
goal:"White to move and mate in 1"
}

];

const pieces = {

wp:'♙',
wr:'♖',
wn:'♘',
wb:'♗',
wq:'♕',
wk:'♔',

bp:'♟',
br:'♜',
bn:'♞',
bb:'♝',
bq:'♛',
bk:'♚'

};

function selectBot(level){

currentBotLevel = level;

document.getElementById('thinking').innerHTML =
"Selected AI: " + level + " ELO";

setTimeout(()=>{
document.getElementById('thinking').innerHTML='';
},1000);

}

function newGame(){

chess.reset();

renderBoard();

document.getElementById('status').innerHTML='🆕 New Game Started';

}

function offerDraw(){

document.getElementById('status').innerHTML='🤝 Draw Agreed';

}

function resignGame(){

document.getElementById('status').innerHTML='🏳 You Resigned';

}

function loadPuzzle(){

const randomPuzzle =
puzzleData[Math.floor(Math.random()*puzzleData.length)];

chess.load(randomPuzzle.fen);

renderBoard();

document.getElementById('status').innerHTML =
"🧩 " + randomPuzzle.name;

document.getElementById('thinking').innerHTML =
randomPuzzle.goal;

}

function renderBoard(){

board.innerHTML='';

const currentBoard = chess.board();

for(let row=0;row<8;row++){

for(let col=0;col<8;col++){

const square=document.createElement('div');

const isLight=(row+col)%2===0;

square.className=`square ${isLight?'light':'dark'}`;

const squareName='abcdefgh'[col]+(8-row);

const piece=currentBoard[row][col];

if(piece){

square.textContent=pieces[piece.color+piece.type];

if(piece.color==='w'){
square.classList.add('white-piece');
}else{
square.classList.add('black-piece');
}

}

if(selectedSquare===squareName){
square.classList.add('selected');
}

if(possibleMoves.includes(squareName)){
square.classList.add('possible');
}

square.addEventListener('click',()=>onSquareClick(squareName));

board.appendChild(square);

}

}

document.getElementById('moves').innerHTML=
chess.history().join(' ');

updateStatus();

}

function onSquareClick(square){

if(chess.turn()!=='w') return;

const piece=chess.get(square);

if(selectedSquare){

const move=chess.move({

from:selectedSquare,
to:square,
promotion:'q'

});

if(move){

selectedSquare=null;
possibleMoves=[];

renderBoard();

if(chess.in_checkmate()){

document.getElementById('status').innerHTML =
'🎉 Checkmate!';

return;

}

setTimeout(botMove,100);

return;

}

}

if(piece && piece.color==='w'){

selectedSquare=square;

possibleMoves=chess.moves({
square,
verbose:true
}).map(m=>m.to);

}else{

selectedSquare=null;
possibleMoves=[];

}

renderBoard();

}

function updateStatus(){

if(chess.in_checkmate()){

document.getElementById('status').innerHTML='🔥 Checkmate';

}
else if(chess.in_draw()){

document.getElementById('status').innerHTML='🤝 Draw';

}
else if(chess.in_check()){

document.getElementById('status').innerHTML='⚠ Check';

}
else{

document.getElementById('status').innerHTML=
chess.turn()==='w'
?'White to move'
:'Black to move';

}

}

function evaluateBoard(){

const values={
p:100,
n:320,
b:330,
r:500,
q:900,
k:20000
};

let score=0;

chess.board().forEach(row=>{

row.forEach(piece=>{

if(!piece) return;

const value=values[piece.type];

score += piece.color==='b'?value:-value;

});

});

return score;

}

//
// FAST BOT
//

function botMove(){

if(chess.game_over()) return;

document.getElementById('thinking').innerHTML='🤖 Bot thinking...';

setTimeout(()=>{

document.getElementById('thinking').innerHTML='';

const level=currentBotLevel;

const legalMoves=chess.moves();

//
// EASY BOTS
//

if(level <= 1000){

const move =
legalMoves[Math.floor(Math.random()*legalMoves.length)];

chess.move(move);

renderBoard();

return;

}

//
// SMARTER BOTS
//

let bestMove = null;
let bestScore = -999999;

for(const move of legalMoves){

chess.move(move);

let score = evaluateBoard();

if(move.includes('x')) score += 50;

if(chess.in_check()) score += 100;

if(move === 'O-O' || move === 'O-O-O') score += 30;

chess.undo();

score += Math.random()*20;

if(score > bestScore){

bestScore = score;
bestMove = move;

}

}

if(!bestMove){

bestMove =
legalMoves[Math.floor(Math.random()*legalMoves.length)];

}

chess.move(bestMove);

renderBoard();

},100);

}

renderBoard();

</script>

</body>
</html>
