<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Arena Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#312e2b;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
min-height:100vh;
}

h1{
font-size:48px;
margin-bottom:20px;
color:#81b64c;
text-align:center;
}

.auth-box{
background:#262421;
padding:25px;
border-radius:16px;
width:420px;
display:flex;
flex-direction:column;
gap:12px;
margin-bottom:25px;
}

.auth-box input{
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

.auth-box button{
padding:14px;
border:none;
border-radius:10px;
background:#81b64c;
color:white;
font-size:18px;
cursor:pointer;
}

.board{
width:700px;
height:700px;
display:grid;
grid-template-columns:repeat(8,1fr);
border-radius:14px;
overflow:hidden;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.square{
display:flex;
align-items:center;
justify-content:center;
font-size:72px;
cursor:pointer;
transition:0.15s;
user-select:none;
text-shadow:0 2px 4px rgba(0,0,0,0.5);
}

.square:hover{
transform:scale(1.03);
}

.light{
background:#f0d9b5;
}

.dark{
background:#b58863;
}

.white-piece{
color:white;
}

.black-piece{
color:black;
}

.selected{
outline:5px solid yellow;
}

.possible{
box-shadow:inset 0 0 0 5px yellow;
}

.sidebar{
margin-top:25px;
width:700px;
}

.bot{
padding:16px;
background:#262421;
margin-top:12px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:20px;
transition:0.2s;
}

.bot:hover{
background:#81b64c;
}

#status{
margin-top:20px;
font-size:30px;
font-weight:bold;
text-align:center;
}

#thinking{
margin-top:12px;
color:gold;
font-size:24px;
text-align:center;
}

#profile{
margin-top:10px;
line-height:1.8;
font-size:18px;
}

@media(max-width:800px){

.board{
width:95vw;
height:95vw;
}

.square{
font-size:10vw;
}

.sidebar{
width:95vw;
}

.auth-box{
width:95vw;
}

}

</style>
</head>

<body>

<h1>♟ Chess Arena Pro</h1>

<div class="auth-box">

<input type="text" id="username" placeholder="Username">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

<button onclick="login()">Login</button>

<div id="profile"></div>

</div>

<div class="board" id="board"></div>

<div id="status"></div>

<div id="thinking"></div>

<div class="sidebar">

<div class="bot" onclick="selectBot(250)">🤪 Timmy Beginner — 250</div>

<div class="bot" onclick="selectBot(600)">🙂 Alex Casual — 600</div>

<div class="bot" onclick="selectBot(1000)">😎 Noah Club Player — 1000</div>

<div class="bot" onclick="selectBot(1400)">🧠 Sofia Tactical — 1400</div>

<div class="bot" onclick="selectBot(1800)">🔥 Victor Advanced — 1800</div>

<div class="bot" onclick="selectBot(2200)">♜ IM Daniel — 2200</div>

<div class="bot" onclick="selectBot(2300)">👑 GM Hikaru Style — 2300</div>

<div class="bot" onclick="selectBot(2400)">♛ GM Magnus Style — 2400</div>

<div class="bot" onclick="selectBot(2500)">💀 GM Alpha — 2500</div>

<div class="bot" onclick="selectBot(2600)">☠ Elite Engine — 2600</div>

<div class="bot" onclick="selectBot(2700)">🚀 Super GM — 2700</div>

<div class="bot" onclick="selectBot(2800)">🤖 Stockfish Monster — 2800</div>

</div>

<div id="moves" style="margin-top:20px;width:700px;background:#262421;padding:20px;border-radius:12px;line-height:1.8;"></div>

<script>

function signup(){

const username=document.getElementById('username').value;
const email=document.getElementById('email').value;
const password=document.getElementById('password').value;

if(!username || !email || !password){

alert('Fill all fields');
return;

}

localStorage.setItem('username',username);
localStorage.setItem('email',email);
localStorage.setItem('password',password);

alert('Account Created!');

loadProfile();

}

function login(){

const email=document.getElementById('email').value;
const password=document.getElementById('password').value;

if(
email===localStorage.getItem('email') &&
password===localStorage.getItem('password')
){

alert('Logged In!');
loadProfile();

}else{

alert('Wrong Login');

}

}

function loadProfile(){

document.getElementById('profile').innerHTML=`

<h3>👤 ${localStorage.getItem('username')}</h3>

<p>📧 ${localStorage.getItem('email')}</p>

`;

}

if(localStorage.getItem('username')){
loadProfile();
}

const chess = new Chess();

const board = document.getElementById('board');

let currentBotLevel = 250;

let selectedSquare = null;

let possibleMoves = [];

const pieces = {

wp:'♙',
wr:'♖',
wn:'♘',
wb:'♗',
wq:'♕',
wk:'♔',

bp:'♟',
br:'♜',
bn:'♞',
bb:'♝',
bq:'♛',
bk:'♚'

};

function selectBot(level){

currentBotLevel = level;

document.getElementById('thinking').innerHTML =
"Selected AI: " + level + " ELO";

setTimeout(()=>{
document.getElementById('thinking').innerHTML='';
},1000);

}

function renderBoard(){

board.innerHTML='';

const currentBoard = chess.board();

for(let row=0;row<8;row++){

for(let col=0;col<8;col++){

const square=document.createElement('div');

const isLight=(row+col)%2===0;

square.className=`square ${isLight?'light':'dark'}`;

const squareName='abcdefgh'[col]+(8-row);

const piece=currentBoard[row][col];

if(piece){

square.textContent=pieces[piece.color+piece.type];

if(piece.color==='w'){
square.classList.add('white-piece');
}else{
square.classList.add('black-piece');
}

}

if(selectedSquare===squareName){
square.classList.add('selected');
}

if(possibleMoves.includes(squareName)){
square.classList.add('possible');
}

square.addEventListener('click',()=>onSquareClick(squareName));

board.appendChild(square);

}

}

document.getElementById('moves').innerHTML=
chess.history().join(' ');

updateStatus();

}

function onSquareClick(square){

if(chess.turn()!=='w') return;

const piece=chess.get(square);

if(selectedSquare){

const move=chess.move({

from:selectedSquare,
to:square,
promotion:'q'

});

if(move){

selectedSquare=null;
possibleMoves=[];

renderBoard();

setTimeout(botMove,150);

return;

}

}

if(piece && piece.color==='w'){

selectedSquare=square;

possibleMoves=chess.moves({
square,
verbose:true
}).map(m=>m.to);

}else{

selectedSquare=null;
possibleMoves=[];

}

renderBoard();

}

function updateStatus(){

if(chess.in_checkmate()){

document.getElementById('status').innerHTML='🔥 Checkmate';

}
else if(chess.in_draw()){

document.getElementById('status').innerHTML='🤝 Draw';

}
else{

document.getElementById('status').innerHTML=
chess.turn()==='w'
?'White to move'
:'Black to move';

}

}

function evaluateBoard(){

const values={
p:100,
n:320,
b:330,
r:500,
q:900,
k:20000
};

let score=0;

chess.board().forEach(row=>{

row.forEach(piece=>{

if(!piece) return;

const value=values[piece.type];

score += piece.color==='b'?value:-value;

});

});

return score;

}

function minimax(depth,alpha,beta,maximizing){

if(depth===0 || chess.game_over()){

return evaluateBoard();

}

const moves=chess.moves();

if(maximizing){

let maxEval=-Infinity;

for(const move of moves){

chess.move(move);

const evalScore=minimax(depth-1,alpha,beta,false);

chess.undo();

maxEval=Math.max(maxEval,evalScore);

alpha=Math.max(alpha,evalScore);

if(beta<=alpha) break;

}

return maxEval;

}else{

let minEval=Infinity;

for(const move of moves){

chess.move(move);

const evalScore=minimax(depth-1,alpha,beta,true);

chess.undo();

minEval=Math.min(minEval,evalScore);

beta=Math.min(beta,evalScore);

if(beta<=alpha) break;

}

return minEval;

}

}

function botMove(){

if(chess.game_over()) return;

document.getElementById('thinking').innerHTML='🤖 Bot thinking...';

setTimeout(()=>{

document.getElementById('thinking').innerHTML='';

const level=currentBotLevel;

let depth=1;
let randomChance=0.5;

if(level>=600){
depth=2;
randomChance=0.3;
}

if(level>=1200){
depth=3;
randomChance=0.15;
}

if(level>=1800){
depth=4;
randomChance=0.05;
}

const legalMoves=chess.moves();

if(Math.random()<randomChance){

const randomMove =
legalMoves[Math.floor(Math.random()*legalMoves.length)];

chess.move(randomMove);

renderBoard();

return;

}

let bestMove=null;
let bestValue=-999999;

for(const move of legalMoves){

chess.move(move);

let value=minimax(depth-1,-100000,100000,false);

if(move.includes('x')) value += 50;

if(chess.in_check()) value += 30;

chess.undo();

if(value>bestValue){

bestValue=value;
bestMove=move;

}

}

if(!bestMove){

bestMove =
legalMoves[Math.floor(Math.random()*legalMoves.length)];

}

chess.move(bestMove);

renderBoard();

},150);

}

renderBoard();

</script>

</body>
</html>
