<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Arena Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#312e2b;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

h1{
font-size:52px;
margin-bottom:20px;
color:#81b64c;
}

.board{
width:640px;
height:640px;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
border:8px solid #262421;
border-radius:12px;
overflow:hidden;
}

.square{
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
cursor:pointer;
user-select:none;
}

.light{
background:#f0d9b5;
}

.dark{
background:#b58863;
}

.white-piece{
color:white;
text-shadow:0 0 3px black;
}

.black-piece{
color:black;
}

.selected{
outline:4px solid yellow;
}

.possible{
box-shadow:inset 0 0 0 4px yellow;
}

#status{
margin-top:20px;
font-size:28px;
font-weight:bold;
}

#thinking{
margin-top:10px;
font-size:22px;
color:gold;
height:30px;
}

.controls{
width:640px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:#81b64c;
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.sidebar{
width:640px;
margin-top:20px;
}

.bot{
padding:14px;
background:#262421;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.bot:hover{
background:#81b64c;
}

#moves{
width:640px;
background:#262421;
margin-top:20px;
padding:20px;
border-radius:12px;
min-height:120px;
line-height:1.8;
}

@media(max-width:700px){

.board{
width:96vw;
height:96vw;
}

.square{
font-size:10vw;
}

.controls,
.sidebar,
#moves{
width:96vw;
}

}

</style>
</head>

<body>

<h1>♟ Chess Arena Pro</h1>

<div class="board" id="board"></div>

<div id="status"></div>

<div id="thinking"></div>

<div class="controls">

<button onclick="newGame()">🆕 New Game</button>

<button onclick="offerDraw()">🤝 Draw</button>

<button onclick="resignGame()">🏳 Resign</button>

<button onclick="loadPuzzle()">🧩 Puzzle Mode</button>

</div>

<div class="sidebar">

<div class="bot" onclick="selectBot(250)">🤪 250 ELO</div>
<div class="bot" onclick="selectBot(600)">🙂 600 ELO</div>
<div class="bot" onclick="selectBot(1000)">😎 1000 ELO</div>
<div class="bot" onclick="selectBot(1400)">🧠 1400 ELO</div>
<div class="bot" onclick="selectBot(1800)">🔥 1800 ELO</div>
<div class="bot" onclick="selectBot(2200)">♜ 2200 ELO</div>
<div class="bot" onclick="selectBot(2300)">👑 Hikaru Bot</div>
<div class="bot" onclick="selectBot(2400)">♛ Magnus Bot</div>
<div class="bot" onclick="selectBot(2500)">💀 GM Alpha</div>
<div class="bot" onclick="selectBot(2800)">🤖 Stockfish Monster</div>

</div>

<div id="moves"></div>

<script>

const chess = new Chess();

const board = document.getElementById('board');

let currentBotLevel = 250;

let selectedSquare = null;

let possibleMoves = [];

const puzzleData = [

{
name:"Mate in 1",
fen:"6k1/5ppp/8/8/8/8/5PPP/6KQ w - - 0 1",
goal:"White to move and mate in 1"
}

];

const pieces = {

wp:'♙',
wr:'♖',
wn:'♘',
wb:'♗',
wq:'♕',
wk:'♔',

bp:'♟',
br:'♜',
bn:'♞',
bb:'♝',
bq:'♛',
bk:'♚'

};

function selectBot(level){

currentBotLevel = level;

document.getElementById('thinking').innerHTML =
'Selected ' + level + ' ELO Bot';

setTimeout(()=>{
document.getElementById('thinking').innerHTML='';
},1000);

}

function newGame(){

chess.reset();

renderBoard();

}

function offerDraw(){

document.getElementById('status').innerHTML =
'🤝 Draw Agreed';

}

function resignGame(){

document.getElementById('status').innerHTML =
'🏳 You Resigned';

}

function loadPuzzle(){

const randomPuzzle =
puzzleData[Math.floor(Math.random()*puzzleData.length)];

chess.load(randomPuzzle.fen);

renderBoard();

document.getElementById('status').innerHTML =
'🧩 ' + randomPuzzle.name;

document.getElementById('thinking').innerHTML =
randomPuzzle.goal;

}

function renderBoard(){

board.innerHTML='';

const currentBoard = chess.board();

for(let row=0;row<8;row++){

for(let col=0;col<8;col++){

const square = document.createElement('div');

const isLight = (row + col) % 2 === 0;

square.className =
'square ' + (isLight ? 'light' : 'dark');

const squareName =
'abcdefgh'[col] + (8-row);

const piece = currentBoard[row][col];

if(piece){

square.textContent =
pieces[piece.color + piece.type];

if(piece.color === 'w'){
square.classList.add('white-piece');
}else{
square.classList.add('black-piece');
}

}

if(selectedSquare === squareName){
square.classList.add('selected');
}

if(possibleMoves.includes(squareName)){
square.classList.add('possible');
}

square.addEventListener(
'click',
()=>onSquareClick(squareName)
);

board.appendChild(square);

}

}

document.getElementById('moves').innerHTML =
chess.history().join(' ');

updateStatus();

}

function onSquareClick(square){

if(chess.turn() !== 'w') return;

const piece = chess.get(square);

if(selectedSquare){

const move = chess.move({

from:selectedSquare,
to:square,
promotion:'q'

});

if(move){

selectedSquare = null;
possibleMoves = [];

renderBoard();

if(chess.in_checkmate()){

document.getElementById('status').innerHTML =
'🎉 Checkmate!';

return;

}

setTimeout(botMove,200);

return;

}

}

if(piece && piece.color === 'w'){

selectedSquare = square;

possibleMoves = chess.moves({
square,
verbose:true
}).map(m=>m.to);

}else{

selectedSquare = null;
possibleMoves = [];

}

renderBoard();

}

function updateStatus(){

if(chess.in_checkmate()){

document.getElementById('status').innerHTML =
'🔥 Checkmate';

}
else if(chess.in_draw()){

document.getElementById('status').innerHTML =
'🤝 Draw';

}
else if(chess.in_check()){

document.getElementById('status').innerHTML =
'⚠ Check';

}
else{

document.getElementById('status').innerHTML =
chess.turn() === 'w'
?'White to move'
:'Black to move';

}

}

//
// WORKING BOT
//

function botMove(){

if(chess.game_over()) return;

document.getElementById('thinking').innerHTML =
'🤖 Bot thinking...';

setTimeout(()=>{

const legalMoves = chess.moves();

let move;

//
// EASY
//

if(currentBotLevel <= 1000){

move =
legalMoves[Math.floor(Math.random()*legalMoves.length)];

}

//
// STRONGER
//

else{

let bestScore = -99999;
let bestMove = legalMoves[0];

for(const m of legalMoves){

const moveObj = chess.move(m);

let score = 0;

if(moveObj.captured){

if(moveObj.captured === 'q') score += 900;
if(moveObj.captured === 'r') score += 500;
if(moveObj.captured === 'b') score += 330;
if(moveObj.captured === 'n') score += 320;
if(moveObj.captured === 'p') score += 100;

}

if(chess.in_check()) score += 200;

if(chess.in_checkmate()) score += 100000;

chess.undo();

score += Math.random()*10;

if(score > bestScore){

bestScore = score;
bestMove = m;

}

}

move = bestMove;

}

chess.move(move);

document.getElementById('thinking').innerHTML='';

renderBoard();

},200);

}

renderBoard();

</script>

</body>
</html>
