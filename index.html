<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Arena Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>

//
// REAL STOCKFISH 17.1 NNUE ENGINE
//

const stockfish = new Worker(
'https://cdn.jsdelivr.net/npm/stockfish@17.1.0/src/stockfish-17.1-lite-single.js'
);

</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#312e2b;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

h1{
font-size:52px;
margin-bottom:20px;
color:#81b64c;
}

#currentBot{
font-size:26px;
font-weight:bold;
margin-bottom:15px;
color:gold;
}

.board{
width:640px;
height:640px;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
border:8px solid #262421;
border-radius:12px;
overflow:hidden;
}

.square{
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
cursor:pointer;
user-select:none;
}

.light{
background:#f0d9b5;
}

.dark{
background:#b58863;
}

.white-piece{
color:white;
text-shadow:0 0 3px black;
}

.black-piece{
color:black;
}

.selected{
outline:4px solid yellow;
}

.possible{
box-shadow:inset 0 0 0 4px yellow;
}

#status{
margin-top:20px;
font-size:28px;
font-weight:bold;
}

#thinking{
margin-top:10px;
font-size:22px;
color:gold;
height:30px;
}

.controls{
width:640px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

button{
padding:15px;
border:none;
border-radius:10px;
background:#81b64c;
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.sidebar{
width:640px;
margin-top:20px;
}

.bot{
padding:14px;
background:#262421;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-size:18px;
font-weight:bold;
}

.bot:hover{
background:#81b64c;
}

#moves{
width:640px;
background:#262421;
margin-top:20px;
padding:20px;
border-radius:12px;
min-height:120px;
line-height:1.8;
}

@media(max-width:700px){

.board{
width:96vw;
height:96vw;
}

.square{
font-size:10vw;
}

.controls,
.sidebar,
#moves{
width:96vw;
}

}

</style>
</head>

<body>

<h1>♟ Chess Arena Pro</h1>

<div id="currentBot">
🤪 Playing: Timmy Beginner (250)
</div>

<div class="board" id="board"></div>

<div id="status"></div>

<div id="thinking"></div>

<div class="controls">

<button onclick="newGame()">🆕 New Game</button>

<button onclick="offerDraw()">🤝 Draw</button>

<button onclick="resignGame()">🏳 Resign</button>

<button onclick="loadPuzzle()">🧩 Puzzle Mode</button>

</div>

<div class="sidebar">

<div class="bot" onclick="selectBot(250,'Timmy Beginner')">🤪 Timmy Beginner — 250</div>

<div class="bot" onclick="selectBot(600,'Alex Casual')">🙂 Alex Casual — 600</div>

<div class="bot" onclick="selectBot(1000,'Noah Club Player')">😎 Noah Club Player — 1000</div>

<div class="bot" onclick="selectBot(1400,'Sofia Tactical')">🧠 Sofia Tactical — 1400</div>

<div class="bot" onclick="selectBot(1800,'Victor Advanced')">🔥 Victor Advanced — 1800</div>

<div class="bot" onclick="selectBot(2200,'IM Daniel')">♜ IM Daniel — 2200</div>

<div class="bot" onclick="selectBot(2300,'GM Hikaru Style')">👑 GM Hikaru Style — 2300</div>

<div class="bot" onclick="selectBot(2400,'GM Magnus Style')">♛ GM Magnus Style — 2400</div>

<div class="bot" onclick="selectBot(2500,'GM Alpha')">💀 GM Alpha — 2500</div>

<div class="bot" onclick="selectBot(2800,'Stockfish Monster')">🤖 Stockfish Monster — 2800</div>

</div>

<div id="moves"></div>

<script>

const chess = new Chess();

const board = document.getElementById('board');

let currentBotLevel = 250;

let currentBotName = "Timmy Beginner";

let selectedSquare = null;

let possibleMoves = [];

const puzzleData = [

{
name:"Mate in 1",
fen:"6k1/5ppp/8/8/8/8/5PPP/6KQ w - - 0 1",
goal:"White to move and mate in 1"
}

];

const pieces = {

wp:'♙',
wr:'♖',
wn:'♘',
wb:'♗',
wq:'♕',
wk:'♔',

bp:'♟',
br:'♜',
bn:'♞',
bb:'♝',
bq:'♛',
bk:'♚'

};

function selectBot(level,name){

currentBotLevel = level;

currentBotName = name;

document.getElementById('currentBot').innerHTML =
'🤖 Playing: ' + name + ' (' + level + ')';

document.getElementById('thinking').innerHTML =
'Selected ' + name;

setTimeout(()=>{
document.getElementById('thinking').innerHTML='';
},1000);

}

function newGame(){

chess.reset();

renderBoard();

}

function offerDraw(){

document.getElementById('status').innerHTML =
'🤝 Draw Agreed';

}

function resignGame(){

document.getElementById('status').innerHTML =
'🏳 You Resigned';

}

function loadPuzzle(){

const randomPuzzle =
puzzleData[Math.floor(Math.random()*puzzleData.length)];

chess.load(randomPuzzle.fen);

renderBoard();

document.getElementById('status').innerHTML =
'🧩 ' + randomPuzzle.name;

document.getElementById('thinking').innerHTML =
randomPuzzle.goal;

}

function renderBoard(){

board.innerHTML='';

const currentBoard = chess.board();

for(let row=0;row<8;row++){

for(let col=0;col<8;col++){

const square = document.createElement('div');

const isLight = (row + col) % 2 === 0;

square.className =
'square ' + (isLight ? 'light' : 'dark');

const squareName =
'abcdefgh'[col] + (8-row);

const piece = currentBoard[row][col];

if(piece){

square.textContent =
pieces[piece.color + piece.type];

if(piece.color === 'w'){
square.classList.add('white-piece');
}else{
square.classList.add('black-piece');
}

}

if(selectedSquare === squareName){
square.classList.add('selected');
}

if(possibleMoves.includes(squareName)){
square.classList.add('possible');
}

square.addEventListener(
'click',
()=>onSquareClick(squareName)
);

board.appendChild(square);

}

}

document.getElementById('moves').innerHTML =
chess.history().join(' ');

updateStatus();

}

function onSquareClick(square){

if(chess.turn() !== 'w') return;

const piece = chess.get(square);

if(selectedSquare){

const move = chess.move({

from:selectedSquare,
to:square,
promotion:'q'

});

if(move){

selectedSquare = null;
possibleMoves = [];

renderBoard();

if(chess.in_checkmate()){

document.getElementById('status').innerHTML =
'🎉 Checkmate!';

return;

}

setTimeout(botMove,100);

return;

}

}

if(piece && piece.color === 'w'){

selectedSquare = square;

possibleMoves = chess.moves({
square,
verbose:true
}).map(m=>m.to);

}else{

selectedSquare = null;
possibleMoves = [];

}

renderBoard();

}

function updateStatus(){

if(chess.in_checkmate()){

document.getElementById('status').innerHTML =
'🔥 Checkmate';

}
else if(chess.in_draw()){

document.getElementById('status').innerHTML =
'🤝 Draw';

}
else if(chess.in_check()){

document.getElementById('status').innerHTML =
'⚠ Check';

}
else{

document.getElementById('status').innerHTML =
chess.turn() === 'w'
?'White to move'
:'Black to move';

}

}

//
// REAL STOCKFISH 17.1 NNUE ENGINE
//

function botMove(){

if(chess.game_over()) return;

document.getElementById('thinking').innerHTML =
'🤖 ' + currentBotName + ' thinking...';

let skill = 0;
let depth = 1;

if(currentBotLevel >= 600){
skill = 3;
depth = 4;
}

if(currentBotLevel >= 1000){
skill = 6;
depth = 6;
}

if(currentBotLevel >= 1400){
skill = 10;
depth = 8;
}

if(currentBotLevel >= 1800){
skill = 14;
depth = 10;
}

if(currentBotLevel >= 2200){
skill = 18;
depth = 13;
}

if(currentBotLevel >= 2500){
skill = 20;
depth = 16;
}

if(currentBotLevel >= 2800){
skill = 20;
depth = 20;
}

stockfish.postMessage(
'setoption name Skill Level value ' + skill
);

stockfish.postMessage(
'setoption name Threads value 2'
);

stockfish.postMessage(
'setoption name Hash value 256'
);

stockfish.postMessage(
'position fen ' + chess.fen()
);

stockfish.postMessage(
'go depth ' + depth
);

stockfish.onmessage = function(event){

const line = event.data;

if(line.startsWith('bestmove')){

const move = line.split(' ')[1];

if(move && move !== '(none)'){

chess.move({
from:move.substring(0,2),
to:move.substring(2,4),
promotion:'q'
});

renderBoard();

document.getElementById('thinking').innerHTML='';

}

}

};

}

renderBoard();

</script>

</body>
</html>
